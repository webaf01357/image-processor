<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像切り抜きツール - COOP AIZU</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f4f4f4; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        #image-to-crop { max-width: 100%; display: block; }
        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        button { padding: 15px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; }
        .btn-post { background: #28a745; color: white; }
        #status { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📷 画像切り抜き・保存</h2>
        <div>
            <img id="image-to-crop" src="https://picsum.photos/800/600" crossorigin="anonymous" alt="素材画像">
        </div>
        
        <div class="controls">
            <button class="btn-post" onclick="sendToFactory()">切り抜きを実行して保存</button>
        </div>
        <div id="status"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        const image = document.getElementById('image-to-crop');
        const status = document.getElementById('status');
        let cropper;

        image.onload = () => {
            if (cropper) cropper.destroy();
            cropper = new Cropper(image, {
                aspectRatio: 1, // 正方形固定
                viewMode: 1,
            });
        };

        // 2. ブラウザでWebP変換し、工場（/upload）へ送信
        async function sendToFactory() {
            if (!cropper) return;
            
            status.innerText = "⏳ ブラウザで切り抜き＆工場へ送信中...";
            
            // Cropper.jsの機能を使って直接WebP(品質80%)に変換
            cropper.getCroppedCanvas().toBlob(async (blob) => {
                const fileName = `processed_${Date.now()}.webp`;
                
                // main.py の /upload が受け取れる FormData 形式にセット
                const formData = new FormData();
                formData.append('file', blob, fileName);
                formData.append('target_path', fileName);

                try {
                    // /crop ではなく、実在する /upload エンドポイントへ送信！
                    const response = await fetch('https://coop-aizu-image-processor-1039416124488.asia-northeast1.run.app/upload', {
                        method: 'POST',
                        body: formData
                    });
                    
                    const result = await response.json();
                    
                    if (response.ok) {
                        status.innerHTML = `✅ 保存完了！ (ファイル名: ${result.path})`;
                        status.style.color = "green";
                    } else {
                        throw new Error(result.detail || '工場での保存に失敗しました');
                    }
                } catch (e) {
                    status.innerText = "❌ エラー: " + e.message;
                    status.style.color = "red";
                }
            }, 'image/webp', 0.8);
        }
    </script>
</body>
</html>
