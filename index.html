<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像切り抜きツール - COOP AIZU</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f4f4f4; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        #image-to-crop { max-width: 100%; display: block; }
        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        button { padding: 15px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; }
        .btn-post { background: #28a745; color: white; }
        .btn-post:disabled { background: #ccc; cursor: not-allowed; }
        .btn-next { background: #007bff; color: white; margin-top: 10px; display: none; }
        #status { margin-top: 10px; font-weight: bold; }
        .info-box { background: #e9ecef; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 14px;}
    </style>
</head>
<body>
    <div class="container">
        <h2>📷 画像切り抜き・保存</h2>
        
        <div class="info-box" id="image-info">
            ⏳ スプレッドシートから未処理の画像を探しています...
        </div>

        <div>
            <img id="image-to-crop" crossorigin="anonymous" alt="素材画像">
        </div>
        
        <div class="controls">
            <button class="btn-post" id="btn-save" onclick="sendToFactory()" disabled>切り抜きを実行して保存</button>
            <button class="btn-next" id="btn-next" onclick="loadNextImage()">次の未処理画像を読み込む</button>
        </div>
        <div id="status"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        // ========================================================
        // ⚠️ 下記のURLを、取得したGASのウェブアプリURLに書き換えてください
        // ========================================================
        const GAS_URL = "https://coop-aizu-image-processor-1039416124488.asia-northeast1.run.app/gas-proxy";
        
        // バックエンドとR2の設定
        const CLOUD_RUN_URL = "https://coop-aizu-image-processor-1039416124488.asia-northeast1.run.app/upload";
        const R2_PUBLIC_DOMAIN = "https://pub-a97890a7c21e414f8fce01a1395b6085.r2.dev";

        const image = document.getElementById('image-to-crop');
        const status = document.getElementById('status');
        const infoBox = document.getElementById('image-info');
        const btnSave = document.getElementById('btn-save');
        const btnNext = document.getElementById('btn-next');
        
        let cropper;
        let currentRow = null; // スプレッドシートの行番号を保持

        // ページ読み込み時に最初の画像を取得
        window.onload = loadNextImage;

        image.onload = () => {
            if (cropper) cropper.destroy();
            cropper = new Cropper(image, {
                aspectRatio: 1, // 正方形固定
                viewMode: 1,
            });
            btnSave.disabled = false;
        };

        // 1. GASから未処理の画像URLを取得
        async function loadNextImage() {
            status.innerText = "";
            infoBox.innerText = "⏳ スプレッドシートから未処理の画像を探しています...";
            btnSave.disabled = true;
            btnNext.style.display = "none";
            if (cropper) { cropper.destroy(); cropper = null; }
            image.src = "";
            image.alt = "読み込み中...";

            try {
                const response = await fetch(`${GAS_URL}?api=get_unprocessed`);
                const data = await response.json();

                if (data.error) {
                    infoBox.innerText = `✅ ${data.error}`;
                    image.alt = "未処理の画像はありません";
                    return;
                }

                // データ取得成功
                currentRow = data.row;
                infoBox.innerText = `📋 処理中: 行番号 ${data.row} / 素材ID: ${data.materialId}`;
                
                // キャッシュ回避のパラメータをつけて画像読み込み
                image.src = data.imageUrl + (data.imageUrl.includes('?') ? '&' : '?') + 't=' + Date.now();

            } catch (e) {
                infoBox.innerText = "❌ スプレッドシートからの取得に失敗しました。";
                console.error(e);
            }
        }

        // 2. 切り抜き・保存・GASへの完了報告
        async function sendToFactory() {
            if (!cropper || !currentRow) return;
            
            btnSave.disabled = true;
            status.innerText = "⏳ 1/2: 工場へ送信中...";
            status.style.color = "black";
            
            cropper.getCroppedCanvas().toBlob(async (blob) => {
                const fileName = `processed_${Date.now()}.webp`;
                const formData = new FormData();
                formData.append('file', blob, fileName);
                formData.append('target_path', fileName);

                try {
                    // ① Cloud Run へアップロード
                    const response = await fetch(CLOUD_RUN_URL, {
                        method: 'POST',
                        body: formData
                    });
                    
                    const result = await response.json();
                    if (!response.ok) throw new Error(result.detail || '工場での保存に失敗しました');

                    // ② R2の公開URLを生成し、GASへ報告
                    const r2PublicUrl = `${R2_PUBLIC_DOMAIN}/${result.path}`;
                    status.innerText = "⏳ 2/2: スプレッドシートを更新中...";

                    const gasResponse = await fetch(GAS_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain' }, // CORSエラー回避のおまじない
                        body: JSON.stringify({
                            action: 'update_status',
                            row: currentRow,
                            r2Url: r2PublicUrl
                        })
                    });

                    const gasResult = await gasResponse.json();
                    if (!gasResult.success) throw new Error(gasResult.error || 'シートの更新に失敗しました');

                    // 全ての処理が完了
                    status.innerHTML = `✅ 完了！ (R2に保存し、シートを更新しました)<br><a href="${r2PublicUrl}" target="_blank">保存された画像を見る</a>`;
                    status.style.color = "green";
                    
                    // 次の画像へ進むボタンを表示
                    btnNext.style.display = "block";

                } catch (e) {
                    status.innerText = "❌ エラー: " + e.message;
                    status.style.color = "red";
                    btnSave.disabled = false;
                }
            }, 'image/webp', 0.8);
        }
    </script>
</body>
</html>
