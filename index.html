<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像処理エディタ - ProStore Ops</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root { --primary: #06c755; }
        .bg-primary { background-color: var(--primary); }
        .text-primary { color: var(--primary); }
        .cropper-view-box, .cropper-face { border-radius: 8px; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900 pb-10">

    <header class="bg-white shadow-sm px-4 py-4 mb-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <span class="material-icons text-primary">content_cut</span>
            <h1 class="font-bold text-lg">画像切り抜き・保存</h1>
        </div>
        <button onclick="loadNextImage()" class="text-gray-400 hover:text-primary transition-colors">
            <span class="material-icons">refresh</span>
        </button>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">
        
        <div id="image-info" class="bg-blue-50 p-4 rounded-2xl border border-blue-100 flex items-center gap-3">
            <span class="material-icons text-blue-500">info</span>
            <div class="text-sm text-blue-700 font-medium leading-tight">データを取得中...</div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden relative min-h-[300px] flex items-center justify-center bg-gray-100">
            <img id="image-to-crop" crossorigin="anonymous" class="max-w-full block">
            <div id="loading-overlay" class="absolute inset-0 bg-white bg-opacity-80 flex flex-col items-center justify-center gap-2">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
                <span class="text-xs font-bold text-gray-400">LOADING</span>
            </div>
        </div>
        
        <div class="space-y-3">
            <button id="btn-save" onclick="sendToFactory()" disabled class="w-full py-4 bg-primary text-white rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg disabled:opacity-50 disabled:cursor-not-allowed transform active:scale-95 transition-all">
                <span class="material-icons">save</span>切り抜いてR2に保存
            </button>
            <button id="btn-next" onclick="loadNextImage()" class="hidden w-full py-4 bg-white text-gray-600 border border-gray-200 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-sm transform active:scale-95 transition-all">
                <span class="material-icons">arrow_forward</span>次の画像を読み込む
            </button>
        </div>

        <div id="status" class="text-center p-3 text-sm font-bold hidden rounded-xl"></div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        // エンドポイント設定（名称変更後を想定）
        const BASE_URL = "https://image-processor.asia-northeast1.run.app"; 
        const GAS_PROXY_URL = `${BASE_URL}/gas-proxy`;
        const UPLOAD_URL = `${BASE_URL}/upload`;
        const R2_PUBLIC_DOMAIN = "https://pub-a97890a7c21e414f8fce01a1395b6085.r2.dev";

        const image = document.getElementById('image-to-crop');
        const infoBox = document.getElementById('image-info');
        const btnSave = document.getElementById('btn-save');
        const btnNext = document.getElementById('btn-next');
        const status = document.getElementById('status');
        const loader = document.getElementById('loading-overlay');
        
        let cropper;
        let currentRow = null;

        window.onload = loadNextImage;

        image.onload = () => {
            if (cropper) cropper.destroy();
            cropper = new Cropper(image, {
                aspectRatio: 1,
                viewMode: 1,
                dragMode: 'move',
                autoCropArea: 0.8,
            });
            btnSave.disabled = false;
            loader.classList.add('hidden');
        };

        async function loadNextImage() {
            status.classList.add('hidden');
            loader.classList.remove('hidden');
            infoBox.querySelector('div').innerText = "未処理の画像を探索中...";
            btnSave.disabled = true;
            btnNext.classList.add('hidden');
            if (cropper) { cropper.destroy(); cropper = null; }
            image.src = "";

            try {
                const response = await fetch(`${GAS_PROXY_URL}?api=get_unprocessed`);
                if (!response.ok) throw new Error("API接続エラー");
                const data = await response.json();

                if (data.error || !data.imageUrl) {
                    infoBox.querySelector('div').innerText = data.error || "未処理の画像はありません";
                    loader.classList.add('hidden');
                    return;
                }

                currentRow = data.row;
                infoBox.querySelector('div').innerText = `素材ID: ${data.materialId} を編集中`;
                image.src = data.imageUrl + (data.imageUrl.indexOf('?') !== -1 ? '&' : '?') + 't=' + Date.now();
            } catch (e) {
                infoBox.querySelector('div').innerText = "エラーが発生しました";
                loader.classList.add('hidden');
            }
        }

        async function sendToFactory() {
            if (!cropper || !currentRow) return;
            
            btnSave.disabled = true;
            btnSave.innerHTML = '<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div> 保存中...';
            
            cropper.getCroppedCanvas().toBlob(async (blob) => {
                const fileName = `processed_${Date.now()}.webp`;
                const formData = new FormData();
                formData.append('file', blob, fileName);
                formData.append('target_path', fileName);

                try {
                    // 1. R2アップロード
                    const uploadRes = await fetch(UPLOAD_URL, { method: 'POST', body: formData });
                    const uploadData = await uploadRes.json();
                    if (!uploadRes.ok) throw new Error("R2への保存に失敗しました");

                    const r2Url = `${R2_PUBLIC_DOMAIN}/${uploadData.path}`;

                    // 2. GAS連携
                    const updateRes = await fetch(GAS_PROXY_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'update_status',
                            row: currentRow,
                            r2Url: r2Url
                        })
                    });

                    const updateData = await updateRes.json();
                    if (!updateData.success) throw new Error("スプレッドシートの更新に失敗しました");

                    showStatus("保存＆連携が完了しました！", "success");
                    btnNext.classList.remove('hidden');
                } catch (e) {
                    showStatus(e.message, "error");
                    btnSave.disabled = false;
                } finally {
                    btnSave.innerHTML = '<span class="material-icons">save</span>切り抜いてR2に保存';
                }
            }, 'image/webp', 0.8);
        }

        function showStatus(msg, type) {
            status.innerText = msg;
            status.className = `text-center p-4 text-sm font-bold rounded-2xl ${type === 'success' ? 'bg-green-50 text-green-600 border border-green-100' : 'bg-red-50 text-red-600 border border-red-100'}`;
            status.classList.remove('hidden');
        }
    </script>
</body>
</html>
